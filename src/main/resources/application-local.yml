spring:
  cloud:
    gateway:
      routes:
        - id: main
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
        - id: notification
          uri: http://localhost:8082
          predicates:
            - Path=/notification/**
        - id: chat
          uri: http://localhost:8083
          predicates:
            - Path=/chat/**
